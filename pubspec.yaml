name: greenwatch
description: App para gestión de residuos sólidos — Distrito San Jerónimo, Cusco

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.1
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1
  google_maps_flutter: ^2.9.0
  camera: ^0.11.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  tflite_flutter: ^0.12.0
  image: ^4.2.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  url_launcher: ^6.3.1
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/waste_model.tflite
    - assets/images/
