workflows:
  ios-no-codesign:
    name: iOS sin firma
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build IPA sin firma
        script: |
          flutter build ios --release --no-codesign
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          PAYLOAD_DIR="build/ios/ipa/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"
          cd build/ios/ipa
          zip -r GREENIA.ipa Payload/
    artifacts:
      - build/ios/ipa/GREENIA.ipa
