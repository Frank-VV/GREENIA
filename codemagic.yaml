workflows:
  ios-no-codesign:
    name: iOS sin firma
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios && pod install
      - name: Build IPA sin firma
        script: |
          flutter build ios --release --no-codesign --dart-define=ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath ../build/ios/xcode \
            -archivePath ../build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          mkdir -p ../build/ios/ipa/Payload
          cp -r "../build/ios/Runner.xcarchive/Products/Applications/Runner.app" \
            "../build/ios/ipa/Payload/Runner.app"
          cd ../build/ios/ipa
          zip -r GREENIA.ipa Payload/
    artifacts:
      - build/ios/ipa/GREENIA.ipa
