workflows:
  ios-no-codesign:
    name: iOS sin firma
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build IPA sin firma
        script: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/ipa
          cd build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/GREENIA.ipa Payload
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/Release-iphoneos/*.app
