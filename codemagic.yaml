workflows:
  ios-no-codesign:
    name: iOS sin firma
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios && pod install
      - name: Build IPA sin firma
        script: |
          flutter build ios --release --no-codesign --dart-define=ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -derivedDataPath ../build/ios/xcode \
            -archivePath ../build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          xcodebuild -exportArchive \
            -archivePath ../build/ios/Runner.xcarchive \
            -exportPath ../build/ios/ipa \
            -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
