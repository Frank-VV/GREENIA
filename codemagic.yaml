workflows:
  ios-no-codesign:
    name: iOS sin firma
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build IPA sin firma
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/Release-iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r GREENIA.ipa Payload
    artifacts:
      - build/ios/Release-iphoneos/GREENIA.ipa
